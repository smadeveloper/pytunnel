# ┌──────────────────────────────────────────────────────────────────────────┐
# │  Nginx config — subdomain.example.com                                    │
# │  WebSocket Reverse Tunnel                                               │
# │                                                                         │
# │  Setup:                                                                 │
# │    1. Copy this file to /etc/nginx/sites-available/subdomain.example.com │
# │    2. Symlink: ln -s /etc/nginx/sites-available/subdomain.example.com    │
# │                /etc/nginx/sites-enabled/                                │
# │    3. Obtain SSL certificate (see Let's Encrypt steps below)            │
# │    4. nginx -t && systemctl reload nginx                                │
# │                                                                         │
# │  Let's Encrypt (first setup — before certificate exists):               │
# │    # Enable the HTTP block, comment out the HTTPS block                 │
# │    # The ACME challenge location below will handle validation           │
# │    certbot certonly --webroot -w /var/www/html \                        │
# │            -d subdomain.example.com                                      │
# │    # Then enable the HTTPS block and reload nginx                       │
# └──────────────────────────────────────────────────────────────────────────┘


# ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name subdomain.example.com;

    # Let's Encrypt ACME challenge (needed for certificate renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# ── HTTPS server ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    # Note: for nginx >= 1.25.1, use the `http2 on;` directive instead
    # Older nginx: listen 443 ssl http2;
    http2 on;

    server_name subdmain.example.com;

    # ── SSL ──────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/subdomain.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/subdmain.example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;   # Not needed with TLSv1.3
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ─────────────────────────────────────────────────
    # NOTE: These headers are also added to tunneled responses.
    # If your local app sets its own headers, there may be duplicates.
    # To avoid conflicts, consider using map + $sent_http_ instead,
    # but for simplicity we keep them here.
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    # ── WebSocket tunnel endpoint ────────────────────────────────────────
    # client.py connects to this path
    location /ws/tunnel {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket is long-lived, so use large timeouts
        proxy_read_timeout 86400s;     # 24 hours
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;

        # Disable buffering for WebSocket
        proxy_buffering off;

        # Skip cache if Varnish/CDN is present
        proxy_no_cache 1;
    }

    # ── Tunnel status endpoint ───────────────────────────────────────────
    # Optional — check if tunnel is connected
    location = /tunnel-status {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── All other requests → tunnel to local server ──────────────────────
    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Streaming / low latency
        proxy_buffering off;
        proxy_request_buffering off;

        # Timeouts
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;

        # Large file uploads
        client_max_body_size 50m;
        client_body_buffer_size 1m;
    }
}
